; FormationPilot - ESP32 Follower Firmware
; =========================================
; by aeroFun Fpv Ingo Ruddat
;
; PlatformIO project for the ESP32-based follower module.
;
; Hardware:
;   - ESP32-WROOM-32 DevKit
;   - SX1278/RFM95W Lora module (433MHz) via SPI
;   - Flight Controller via UART (Serial1)
;   - 4x Status LEDs + 1x Config Button
;
; Upload: pio run --target upload
; Monitor: pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Library dependencies
lib_deps =
    jgromes/RadioLib@^7.0.0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -std=gnu++17

; Upload speed
upload_speed = 921600

; Partition scheme - default is fine for now
; If OTA needed later, switch to: board_build.partitions = default.csv
